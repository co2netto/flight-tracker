name: Flight Price Tracker

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run tracker
        run: python tracker.py
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore

      - name: Save price history to repo
        if: always()
        run: |
          git config user.name  "flight-tracker-bot"
          git config user.email "bot@github-actions"
          git add -f prices.csv debug_*.png 2>/dev/null || true
          git diff --cached --quiet || git commit -m "price update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
